<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0e0e0f;color:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#161618;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;width:100%;max-width:400px;margin:20px}
.logo{text-align:center;margin-bottom:24px;font-size:48px}
h2{text-align:center;font-size:20px;margin-bottom:6px}
p{text-align:center;color:#7a7875;font-size:13px;margin-bottom:24px}
label{display:block;font-size:12px;color:#7a7875;margin-bottom:5px;margin-top:14px}
input{width:100%;background:#1e1e21;border:1px solid rgba(255,255,255,0.15);color:#f0ede8;padding:10px 14px;border-radius:8px;font-size:14px;outline:none;font-family:system-ui}
input:focus{border-color:#c8a96e}
.btn{width:100%;background:#c8a96e;color:#1a1208;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;font-family:system-ui}
.btn:hover{opacity:0.85}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.err{background:rgba(224,90,78,.1);border:1px solid rgba(224,90,78,.4);color:#f08078;border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;display:none}
.ok{background:rgba(76,175,130,.1);border:1px solid rgba(76,175,130,.4);color:#4caf82;border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;display:none}
.switch{text-align:center;margin-top:16px;font-size:13px;color:#7a7875}
.switch span{color:#c8a96e;cursor:pointer}
.page{display:none}
.page.active{display:block}
#status{text-align:center;font-size:11px;color:#4a4845;margin-top:12px}
</style>
</head>
<body>
<div class="card">

  <div class="page active" id="p-reg">
    <div class="logo">G</div>
    <h2>Crea tu cuenta</h2>
    <p>14 días gratis · Sin tarjeta</p>
    <div class="err" id="reg-err"></div>
    <div class="ok"  id="reg-ok"></div>
    <label>Nombre de tu negocio</label>
    <input id="reg-neg" type="text" placeholder="Bar Los Pinos...">
    <label>Email</label>
    <input id="reg-email" type="email" placeholder="tu@email.com">
    <label>Contraseña</label>
    <input id="reg-pass" type="password" placeholder="Mínimo 6 caracteres">
    <button class="btn" id="reg-btn">Crear cuenta gratis</button>
    <div class="switch">¿Ya tienes cuenta? <span id="go-login">Entrar</span></div>
    <div id="status">Cargando...</div>
  </div>

  <div class="page" id="p-login">
    <div class="logo">G</div>
    <h2>Bienvenido</h2>
    <p>Entra en tu cuenta</p>
    <div class="err" id="login-err"></div>
    <label>Email</label>
    <input id="login-email" type="email" placeholder="tu@email.com">
    <label>Contraseña</label>
    <input id="login-pass" type="password" placeholder="Tu contraseña">
    <button class="btn" id="login-btn">Entrar</button>
    <div class="switch">¿No tienes cuenta? <span id="go-reg">Registrarse</span></div>
  </div>

  <div class="page" id="p-dash">
    <div class="logo">✅</div>
    <h2 id="dash-title">¡Bienvenido!</h2>
    <p id="dash-email"></p>
    <button class="btn" id="logout-btn" style="background:#1e1e21;color:#7a7875;border:1px solid rgba(255,255,255,0.1)">Cerrar sesión</button>
  </div>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SURL  = atob('aHR0cHM6Ly91bHJhbG50aG10cmhscWd6bGJhai5zdXBhYmFzZS5jbw==');
const SANON = atob('ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnBjM01pT2lKemRYQmhZbUZ6WlNJc0luSmxaaUk2SW5Wc2NtRnNiblJvYlhSeWFHeHhaM3BzWW1GcUlpd2ljbTlzWlNJNkltRnViMjRpTENKcFlYUWlPakUzTnpReU9UTTVOakFzSW1WNGNDSTZNakE0T1RnMk9UazJNSDAuYlVaci1lZTdZcWhENEpTODIxYjZMOHJwQ2N5bFZNTTBfeHczT1NncG81Yw==');
const sb    = createClient(SURL, SANON);

document.getElementById('status').textContent = 'Listo ✓';
console.log('Supabase OK:', !!sb);

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showErr(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
function hideErr(id)       { document.getElementById(id).style.display='none'; }
function showOk(id, msg)   { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }

async function iniciarSesion(user) {
  document.getElementById('dash-title').textContent = '¡Hola, ' + (user.user_metadata?.nombre_negocio || user.email.split('@')[0]) + '!';
  document.getElementById('dash-email').textContent = user.email;
  show('p-dash');
}

document.getElementById('reg-btn').addEventListener('click', async () => {
  hideErr('reg-err');
  const neg   = document.getElementById('reg-neg').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass  = document.getElementById('reg-pass').value;
  if (!neg||!email||!pass) { showErr('reg-err','Rellena todos los campos.'); return; }
  if (pass.length<6)       { showErr('reg-err','Contraseña mínimo 6 caracteres.'); return; }
  const btn = document.getElementById('reg-btn');
  btn.disabled=true; btn.textContent='Creando...';
  try {
    const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ nombre_negocio:neg } } });
    if (error) throw error;
    if (data.user) {
      await sb.from('clientes').insert({ user_id:data.user.id, email, nombre_negocio:neg, plan:'basico' });
      showOk('reg-ok', '¡Cuenta creada! Entrando...');
      setTimeout(() => iniciarSesion(data.user), 1000);
    }
  } catch(e) {
    showErr('reg-err', e.message||'Error al crear la cuenta.');
  } finally {
    btn.disabled=false; btn.textContent='Crear cuenta gratis';
  }
});

document.getElementById('login-btn').addEventListener('click', async () => {
  hideErr('login-err');
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  if (!email||!pass) { showErr('login-err','Rellena email y contraseña.'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled=true; btn.textContent='Entrando...';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password:pass });
    if (error) throw error;
    await iniciarSesion(data.user);
  } catch(e) {
    showErr('login-err', e.message==='Invalid login credentials' ? 'Email o contraseña incorrectos.' : e.message);
  } finally {
    btn.disabled=false; btn.textContent='Entrar';
  }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await sb.auth.signOut(); show('p-login');
});
document.getElementById('go-login').addEventListener('click', () => show('p-login'));
document.getElementById('go-reg').addEventListener('click',   () => show('p-reg'));

const { data:{ session } } = await sb.auth.getSession();
if (session?.user) await iniciarSesion(session.user);
</script>
</body>
</html>
